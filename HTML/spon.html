<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Industry Sponsors</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link href="../CSS/sponsors.css" rel="stylesheet">
</head>

<body>

<section class="sponsors-section">

  <h2 class="sponsors-title">Our Industry Sponsors</h2>
  <p class="sponsors-subtitle">
    Proudly supported by industry leaders who inspire innovation,
    technical excellence, and future-ready engineers.
  </p>

  <!-- PLATINUM -->
  <div class="tier">
    <div class="tier-title">Platinum Sponsors</div>
    <div class="tier-grid">

      <div class="sponsor-card reveal">
        <img src="https://upload.wikimedia.org/wikipedia/commons/5/5f/Siemens-logo.svg">
        <div class="sponsor-name">Siemens</div>
      </div>

      <div class="sponsor-card reveal">
<img src="http://purepng.com/public/uploads/large/purepng.com-intel-logologobrand-logoiconslogos-251519939644r68ft.png" alt="Intel logo">        <div class="sponsor-name">Schneider Electric</div>
      </div>

      <div class="sponsor-card reveal">
        <img src="https://upload.wikimedia.org/wikipedia/commons/4/44/Microsoft_logo.svg">
        <div class="sponsor-name">Microsoft</div>
      </div>

      <div class="sponsor-card reveal">
        <img src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Google_2015_logo.svg">
        <div class="sponsor-name">Google</div>
      </div>

    </div>
  </div>

  <!-- GOLD -->
  <div class="tier">
    <div class="tier-title">Gold Sponsors</div>
    <div class="tier-grid">

      <div class="sponsor-card reveal">
<img src="http://purepng.com/public/uploads/large/purepng.com-intel-logologobrand-logoiconslogos-251519939644r68ft.png" 
     alt="Intel logo">
             <div class="sponsor-name">Intel</div>
      </div>

      <div class="sponsor-card reveal">
<img src="https://tse3.mm.bing.net/th/id/OIP.DBwD396s7DYHA39JQumhcgHaHa?rs=1&pid=ImgDetMain&o=7&rm=3" 
     alt="Smart sensor device">
          <div class="sponsor-name">ABB</div>
      </div>

      <div class="sponsor-card reveal">
<img src="http://logos-download.com/wp-content/uploads/2016/08/Honeywell_logo.png" 
     alt="Honeywell logo">
      <div class="sponsor-name">Honeywell</div>
      </div>

      <div class="sponsor-card reveal">
<img src="https://logos-world.net/wp-content/uploads/2020/08/Bosch-Emblem.png" 
     alt="Bosch emblem">
             <div class="sponsor-name">Bosch</div>
      </div>

    </div>
  </div>

</section>

<!-- SCROLL REVEAL -->
<script src="../JS/sponsors.js">

</script>

</body>
</html>
